<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gastos"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>Gastos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #e8ff5a;
    --accent-dim: rgba(232,255,90,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

  /* HEADER */
  .header { padding: 20px 20px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .total-mes-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .total-mes-valor { font-family: 'DM Mono', monospace; font-size: 30px; font-weight: 500; color: var(--text); letter-spacing: -1px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .total-hoy-wrap { text-align: right; }
  .total-hoy-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .total-hoy-valor { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--text2); }
  .btn-mic {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-mic.active { background: var(--accent-dim); border-color: var(--accent); }

  /* TABS */
  .tabs { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 12px; font-family: 'DM Sans', sans-serif;
    border: none; background: transparent; color: var(--text3);
    cursor: pointer; border-bottom: 2px solid transparent;
    letter-spacing: 0.3px; transition: color 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CONTENT */
  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .tab-content.active { display: block; }

  /* GRUPOS */
  .grupo-section { margin-bottom: 18px; }
  .grupo-label {
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .grupo-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .cats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cat-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 10px;
    text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s, background 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .cat-btn:active { background: var(--bg3); }
  .cat-btn.fijo { border-color: var(--border2); }
  .cat-emoji { font-size: 22px; flex-shrink: 0; }
  .cat-info { min-width: 0; overflow: hidden; }
  .cat-nombre { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-sub { font-size: 11px; color: var(--text3); margin-top: 1px; display: flex; align-items: center; gap: 3px; }

  .btn-agregar {
    width: 100%; padding: 12px; background: transparent;
    border: 1px dashed var(--border2); border-radius: var(--radius);
    color: var(--text3); font-size: 13px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin-top: 4px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-agregar:active { border-color: var(--accent); color: var(--accent); }

  /* HISTORIAL */
  .historial-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 0; border-bottom: 1px solid var(--border);
  }
  .historial-left { display: flex; align-items: center; gap: 10px; }
  .historial-emoji { font-size: 20px; }
  .historial-nombre { font-size: 13px; font-weight: 500; color: var(--text); }
  .historial-meta { font-size: 11px; color: var(--text3); margin-top: 1px; display: flex; align-items: center; gap: 4px; }
  .historial-monto { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
  .empty-state { text-align: center; padding: 48px 0; color: var(--text3); font-size: 13px; }

  /* RESUMEN */
  .toggle-wrap { display: flex; background: var(--bg2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 16px; }
  .toggle-btn {
    flex: 1; padding: 7px 0; font-size: 12px; border: none;
    border-radius: 6px; background: transparent; color: var(--text3);
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
  .resumen-item { margin-bottom: 14px; }
  .resumen-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .resumen-nombre { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .resumen-valores { display: flex; align-items: baseline; gap: 6px; }
  .resumen-monto { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .resumen-pct { font-size: 11px; color: var(--text3); }
  .barra-bg { background: var(--bg3); border-radius: 3px; height: 5px; }
  .barra-fill { border-radius: 3px; height: 5px; transition: width 0.4s ease; }

  /* CONFIG */
  .config-grupo-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 6px; display: flex; align-items: center; gap: 6px; }
  .config-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 10px; background: var(--bg2); border-radius: var(--radius-sm);
    margin-bottom: 4px; border: 1px solid var(--border);
  }
  .config-item-left { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .config-fijo-badge { font-size: 11px; color: var(--text3); }
  .config-actions { display: flex; gap: 6px; }
  .btn-fijar {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 6px; padding: 4px 8px; font-size: 11px;
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-delete { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text3); padding: 0 2px; }

  .form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 12px; }
  .form-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
  .form-input {
    width: 100%; padding: 9px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
    outline: none; margin-bottom: 8px;
  }
  .form-input::placeholder { color: var(--text3); }
  .form-select {
    width: 100%; padding: 9px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
    outline: none; margin-bottom: 10px;
  }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-color { height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border2); cursor: pointer; width: 100%; margin-bottom: 8px; }
  .btn-primary {
    width: 100%; padding: 10px; background: var(--accent);
    color: #0f0f0f; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .btn-primary:active { opacity: 0.85; }

  /* MODALES */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 50;
    align-items: flex-end; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--bg2); width: 100%; max-width: 480px; margin: 0 auto;
    border-radius: 20px 20px 0 0; padding: 22px 18px 36px;
    border-top: 1px solid var(--border2);
  }
  .modal-handle { width: 36px; height: 4px; background: var(--bg3); border-radius: 2px; margin: 0 auto 18px; }
  .modal-grupo-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .modal-grupo-dot { width: 7px; height: 7px; border-radius: 50%; }
  .modal-grupo-txt { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .modal-title { font-size: 19px; font-weight: 500; color: var(--text); margin-bottom: 16px; }
  .monto-input-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg3); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 10px; border: 1px solid var(--border2); }
  .monto-prefix { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--text3); }
  .monto-input { flex: 1; font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; border: none; background: transparent; color: var(--accent); outline: none; }
  .sugerencias { display: flex; gap: 6px; flex-wrap: wrap; min-height: 30px; margin-bottom: 14px; }
  .sug-btn {
    padding: 5px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 20px; font-size: 12px; color: var(--text2);
    font-family: 'DM Mono', monospace; cursor: pointer;
  }
  .modal-actions { display: flex; gap: 8px; }
  .btn-cancel { flex: 1; padding: 13px; background: var(--bg3); border: none; border-radius: var(--radius-sm); font-size: 14px; color: var(--text2); font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-confirm { flex: 2; padding: 13px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }

  /* MODAL VOZ */
  .voz-center { text-align: center; }
  .mic-ring {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--accent-dim); border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 32px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,255,90,0.3); } 50% { box-shadow: 0 0 0 12px rgba(232,255,90,0); } }
  .voz-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .voz-hint { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
  .voz-live { font-size: 14px; color: var(--text2); font-style: italic; min-height: 22px; margin-bottom: 20px; }
  .btn-cancelar-voz { padding: 10px 28px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .voz-procesando { font-size: 32px; margin-bottom: 12px; }
  .voz-transcripto { font-size: 13px; color: var(--text3); font-style: italic; }
  .voz-confirmar-card { background: var(--bg3); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .voz-cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .voz-emoji-big { font-size: 28px; }
  .voz-cat-nombre { font-size: 16px; font-weight: 500; color: var(--text); }
  .voz-cat-grupo { font-size: 12px; color: var(--text3); }
  .voz-edit-nota { font-size: 11px; color: var(--text3); margin-bottom: 14px; }

  /* SYNC STATUS */
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block; margin-right: 4px;
  }
  .sync-ok { background: #4ade80; }
  .sync-error { background: #f87171; }
  .sync-pending { background: var(--accent); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg2); color: var(--text); padding: 10px 20px;
    border-radius: 20px; font-size: 13px; white-space: nowrap;
    z-index: 100; pointer-events: none; border: 1px solid var(--border2);
    display: none;
  }

  /* SCROLL */
  .tab-content::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="total-mes-label">Este mes</div>
        <div class="total-mes-valor" id="total-mes">$0</div>
      </div>
      <div class="header-right">
        <div class="total-hoy-wrap">
          <div class="total-hoy-label">Hoy</div>
          <div class="total-hoy-valor" id="total-hoy">$0</div>
        </div>
        <button class="btn-mic" id="btn-mic" onclick="toggleMic()">🎙️</button>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-registrar" onclick="showTab('registrar')">Registrar</button>
    <button class="tab-btn" id="tab-historial" onclick="showTab('historial')">Historial</button>
    <button class="tab-btn" id="tab-resumen" onclick="showTab('resumen')">Resumen</button>
    <button class="tab-btn" id="tab-config" onclick="showTab('config')">⚙️</button>
  </div>

  <!-- REGISTRAR -->
  <div class="tab-content active" id="content-registrar">
    <div id="grupos-container"></div>
    <button class="btn-agregar" onclick="showTab('config')">+ Agregar categoría</button>
  </div>

  <!-- HISTORIAL -->
  <div class="tab-content" id="content-historial">
    <div id="historial-lista"><div class="empty-state">Todavía no hay gastos registrados.</div></div>
  </div>

  <!-- RESUMEN -->
  <div class="tab-content" id="content-resumen">
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="toggle-grupo" onclick="setVista('grupo')">Por grupo</button>
      <button class="toggle-btn" id="toggle-cat" onclick="setVista('categoria')">Por categoría</button>
    </div>
    <div id="resumen-contenido"></div>
  </div>

  <!-- CONFIG -->
  <div class="tab-content" id="content-config">
    <div id="config-lista"></div>
    <div class="form-card">
      <div class="form-title">Nueva categoría</div>
      <input class="form-input" id="nueva-nombre" type="text" placeholder="Nombre"/>
      <input class="form-input" id="nueva-emoji" type="text" placeholder="Emoji (ej: 🎯)"/>
      <select class="form-select" id="nueva-grupo"></select>
      <button class="btn-primary" onclick="agregarCategoria()">Agregar</button>
    </div>
    <div class="form-card">
      <div class="form-title">Nuevo grupo</div>
      <div class="form-row">
        <input class="form-input" id="ng-emoji" type="text" placeholder="🏷️" style="width:52px;flex-shrink:0;text-align:center;margin-bottom:0;"/>
        <input class="form-input" id="ng-nombre" type="text" placeholder="Nombre del grupo" style="flex:1;margin-bottom:0;"/>
      </div>
      <input class="form-color" id="ng-color" type="color" value="#e8ff5a"/>
      <button class="btn-primary" onclick="agregarGrupo()">Crear grupo</button>
    </div>
  </div>
</div>

<!-- MODAL MONTO -->
<div class="modal-overlay" id="modal-monto">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-grupo-row">
      <div class="modal-grupo-dot" id="m-dot"></div>
      <div class="modal-grupo-txt" id="m-grupo"></div>
    </div>
    <div class="modal-title" id="m-title"></div>
    <div class="monto-input-wrap">
      <div class="monto-prefix">$</div>
      <input class="monto-input" id="m-monto" type="number" placeholder="0" inputmode="numeric"/>
    </div>
    <div class="sugerencias" id="m-sugs"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal('modal-monto')">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarGasto()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL VOZ -->
<div class="modal-overlay" id="modal-voz">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <div id="voz-escuchando" class="voz-center">
      <div class="mic-ring">🎙️</div>
      <div class="voz-title">Escuchando...</div>
      <div class="voz-hint">Decí algo como "psicólogo 45 mil"</div>
      <div class="voz-live" id="voz-live-txt"></div>
      <button class="btn-cancelar-voz" onclick="detenerMic()">Cancelar</button>
    </div>

    <div id="voz-procesando" style="display:none;" class="voz-center">
      <div class="voz-procesando">⏳</div>
      <div class="voz-title">Interpretando...</div>
      <div class="voz-transcripto" id="voz-transcripto"></div>
    </div>

    <div id="voz-confirmar" style="display:none;">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Entendí esto</div>
      <div class="voz-confirmar-card">
        <div class="voz-cat-row">
          <div class="voz-emoji-big" id="vc-emoji"></div>
          <div>
            <div class="voz-cat-nombre" id="vc-nombre"></div>
            <div class="voz-cat-grupo" id="vc-grupo"></div>
          </div>
        </div>
        <div class="monto-input-wrap" style="margin-bottom:0;">
          <div class="monto-prefix">$</div>
          <input class="monto-input" id="vc-monto" type="number" inputmode="numeric"/>
        </div>
      </div>
      <div class="voz-edit-nota">Podés editar el monto antes de confirmar.</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="cerrarModalVoz()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarVoz()">Confirmar</button>
      </div>
    </div>

    <div id="voz-error" style="display:none;" class="voz-center">
      <div style="font-size:40px;margin-bottom:12px;">😕</div>
      <div class="voz-title">No entendí bien</div>
      <div class="voz-hint" id="voz-error-msg"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;">
        <button class="btn-cancelar-voz" onclick="cerrarModalVoz()">Cancelar</button>
        <button class="btn-confirm" style="flex:none;padding:10px 24px;" onclick="reiniciarVoz()">Reintentar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONFIG CAT -->
<div class="modal-overlay" id="modal-config">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Configurar monto fijo</div>
    <div class="modal-title" id="cfg-title"></div>
    <div class="monto-input-wrap" style="margin-bottom:10px;">
      <div class="monto-prefix">$</div>
      <input class="monto-input" id="cfg-monto" type="number" placeholder="0" inputmode="numeric"/>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:16px;">Dejalo vacío para volver a editable.</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal('modal-config')">Cancelar</button>
      <button class="btn-confirm" onclick="guardarFijo()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbw4XPCtjYAEXD5RVYKmQQLpMBj9zDd1Dl-Y0MW7MyVFfH8JN01-Nd53nlV_OOnEkDPStg/exec';

// ---- ESTADO ----
const DEFAULT_STATE = {
  grupos: [
    { nombre:'Comida',     emoji:'🍔', color:'#7c6af7' },
    { nombre:'Social',     emoji:'🎉', color:'#f76a4a' },
    { nombre:'Transporte', emoji:'🚗', color:'#4af7a0' },
    { nombre:'Personal',   emoji:'🛍️', color:'#f74aab' },
    { nombre:'Salud',      emoji:'🧘', color:'#4ab4f7' },
    { nombre:'Desarrollo', emoji:'🌱', color:'#e8ff5a' },
  ],
  categorias: [
    { nombre:'Comida Oficina',  grupo:'Comida',     emoji:'🍱', historial:[], montoFijo:null },
    { nombre:'Pedidos Ya',      grupo:'Comida',     emoji:'🛵', historial:[], montoFijo:null },
    { nombre:'Kiosco / Chino',  grupo:'Comida',     emoji:'🏪', historial:[], montoFijo:null },
    { nombre:'Salidas',         grupo:'Social',     emoji:'🎊', historial:[], montoFijo:null },
    { nombre:'Asados',          grupo:'Social',     emoji:'🥩', historial:[], montoFijo:null },
    { nombre:'Recitales',       grupo:'Social',     emoji:'🎸', historial:[], montoFijo:null },
    { nombre:'Cancha',          grupo:'Social',     emoji:'⚽', historial:[], montoFijo:null },
    { nombre:'Auto',            grupo:'Transporte', emoji:'🚘', historial:[], montoFijo:null },
    { nombre:'Transporte',      grupo:'Transporte', emoji:'🚌', historial:[], montoFijo:null },
    { nombre:'Ropa',            grupo:'Personal',   emoji:'👕', historial:[], montoFijo:null },
    { nombre:'Cuidado Personal',grupo:'Personal',   emoji:'✨', historial:[], montoFijo:null },
    { nombre:'Regalos',         grupo:'Personal',   emoji:'🎁', historial:[], montoFijo:null },
    { nombre:'Psicólogo',       grupo:'Salud',      emoji:'🧠', historial:[], montoFijo:null },
    { nombre:'Gimnasio',        grupo:'Salud',      emoji:'💪', historial:[], montoFijo:null },
    { nombre:'Suscripciones',   grupo:'Desarrollo', emoji:'📱', historial:[], montoFijo:null },
    { nombre:'Desarrollo',      grupo:'Desarrollo', emoji:'📚', historial:[], montoFijo:null },
    { nombre:'Carpintería',     grupo:'Desarrollo', emoji:'🪵', historial:[], montoFijo:null },
  ],
  gastos: [],
};

function cargarState() {
  try {
    const s = localStorage.getItem('gastos_state');
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_STATE));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function guardarState() {
  try { localStorage.setItem('gastos_state', JSON.stringify(state)); } catch(e) {}
}

let state = cargarState();
let catActual = null, catConfigActual = null, vozResultado = null;
let recognition = null, transcripcionFinal = '';
let vistaResumen = 'grupo';

// ---- UTILS ----
function fmt(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }
function colorGrupo(nombre) { return (state.grupos.find(g => g.nombre === nombre) || {}).color || '#888'; }
function totalMes() {
  const now = new Date();
  return state.gastos
    .filter(g => { const d = new Date(g.ts); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); })
    .reduce((s,g) => s+g.monto, 0);
}
function totalHoy() {
  const hoy = new Date().toDateString();
  return state.gastos.filter(g => new Date(g.ts).toDateString()===hoy).reduce((s,g) => s+g.monto, 0);
}
function actualizarTotales() {
  document.getElementById('total-mes').textContent = fmt(totalMes());
  document.getElementById('total-hoy').textContent = fmt(totalHoy());
}

// ---- SHEETS SYNC ----
async function syncSheets(gasto) {
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        categoria: gasto.cat,
        grupo: gasto.grupo,
        monto: gasto.monto,
        fuente: gasto.fuenteVoz ? 'voz' : (gasto.esFijo ? 'fijo' : 'manual')
      })
    });
  } catch(e) { console.warn('Sync error:', e); }
}

// ---- TABS ----
function showTab(tab) {
  ['registrar','historial','resumen','config'].forEach(t => {
    document.getElementById('content-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='resumen') renderResumen();
  if (tab==='config') renderConfig();
}

// ---- REGISTRAR ----
function renderGrupos() {
  const c = document.getElementById('grupos-container');
  c.innerHTML = '';
  state.grupos.forEach(g => {
    const cats = state.categorias.filter(c => c.grupo===g.nombre);
    if (!cats.length) return;
    const sec = document.createElement('div');
    sec.className = 'grupo-section';
    sec.innerHTML = `<div class="grupo-label"><span class="grupo-dot" style="background:${g.color}"></span>${g.emoji} ${g.nombre}</div><div class="cats-grid" id="grid-${g.nombre.replace(/\s/g,'_')}"></div>`;
    c.appendChild(sec);
    const grid = sec.querySelector('.cats-grid');
    cats.forEach(cat => {
      const esFijo = cat.montoFijo !== null;
      let sub = '';
      if (esFijo) sub = `<span style="font-size:9px;">📌</span>${fmt(cat.montoFijo)}`;
      else if (cat.historial.length) sub = fmt(cat.historial[cat.historial.length-1]);
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (esFijo?' fijo':'');
      if (esFijo) btn.style.borderColor = g.color + '60';
      btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><div class="cat-info"><div class="cat-nombre">${cat.nombre}</div><div class="cat-sub">${sub}</div></div>`;
      btn.onclick = () => esFijo ? registrarDirecto(cat.nombre, cat.montoFijo) : abrirModalMonto(cat.nombre);
      grid.appendChild(btn);
    });
  });
}

function registrarDirecto(catNombre, monto) {
  const cat = state.categorias.find(c => c.nombre===catNombre);
  cat.historial.push(monto);
  const g = { cat:cat.nombre, grupo:cat.grupo, emoji:cat.emoji, monto, ts:new Date().toISOString(), esFijo:true };
  state.gastos.unshift(g);
  guardarState(); actualizarTotales(); renderGrupos(); actualizarHistorial();
  syncSheets(g);
  toast('✓ '+cat.nombre+' — '+fmt(monto));
}

function abrirModalMonto(catNombre) {
  catActual = catNombre;
  const cat = state.categorias.find(c => c.nombre===catNombre);
  document.getElementById('m-dot').style.background = colorGrupo(cat.grupo);
  document.getElementById('m-grupo').textContent = cat.grupo;
  document.getElementById('m-title').textContent = cat.emoji+' '+cat.nombre;
  document.getElementById('m-monto').value = '';
  const sug = document.getElementById('m-sugs');
  sug.innerHTML = '';
  [...new Set(cat.historial.slice(-8).reverse())].slice(0,3).forEach(m => {
    const b = document.createElement('button');
    b.className = 'sug-btn'; b.textContent = fmt(m);
    b.onclick = () => document.getElementById('m-monto').value = m;
    sug.appendChild(b);
  });
  document.getElementById('modal-monto').classList.add('open');
  setTimeout(() => document.getElementById('m-monto').focus(), 150);
}

function confirmarGasto() {
  const monto = parseFloat(document.getElementById('m-monto').value);
  if (!monto || monto<=0) return;
  const cat = state.categorias.find(c => c.nombre===catActual);
  cat.historial.push(monto);
  const g = { cat:cat.nombre, grupo:cat.grupo, emoji:cat.emoji, monto, ts:new Date().toISOString() };
  state.gastos.unshift(g);
  cerrarModal('modal-monto');
  guardarState(); actualizarTotales(); renderGrupos(); actualizarHistorial();
  syncSheets(g);
  toast('✓ '+cat.nombre+' — '+fmt(monto));
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ---- HISTORIAL ----
function actualizarHistorial() {
  const lista = document.getElementById('historial-lista');
  if (!state.gastos.length) { lista.innerHTML = '<div class="empty-state">Todavía no hay gastos registrados.</div>'; return; }
  lista.innerHTML = '';
  state.gastos.slice(0,50).forEach(g => {
    const ts = new Date(g.ts);
    const esHoy = new Date().toDateString()===ts.toDateString();
    const horaStr = ts.getHours()+':'+String(ts.getMinutes()).padStart(2,'0');
    const fechaStr = esHoy ? 'Hoy' : ts.toLocaleDateString('es-AR');
    const icono = g.fuenteVoz ? ' 🎙️' : (g.esFijo ? ' 📌' : '');
    const color = colorGrupo(g.grupo);
    const div = document.createElement('div');
    div.className = 'historial-item';
    div.innerHTML = `<div class="historial-left"><div class="historial-emoji">${g.emoji}</div><div><div class="historial-nombre">${g.cat}<span style="font-size:10px;">${icono}</span></div><div class="historial-meta"><span class="grupo-dot" style="background:${color};width:5px;height:5px;"></span>${fechaStr}, ${horaStr}</div></div></div><div class="historial-monto">${fmt(g.monto)}</div>`;
    lista.appendChild(div);
  });
}

// ---- RESUMEN ----
function setVista(v) {
  vistaResumen = v;
  document.getElementById('toggle-grupo').classList.toggle('active', v==='grupo');
  document.getElementById('toggle-cat').classList.toggle('active', v==='categoria');
  renderResumen();
}

function renderResumen() {
  const c = document.getElementById('resumen-contenido');
  const now = new Date();
  const gastosM = state.gastos.filter(g => { const d=new Date(g.ts); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  if (!gastosM.length) { c.innerHTML = '<div class="empty-state">Registrá gastos para ver el resumen.</div>'; return; }
  c.innerHTML = '';
  const por = {};
  if (vistaResumen==='grupo') {
    gastosM.forEach(g => { por[g.grupo]=(por[g.grupo]||0)+g.monto; });
    const max = Math.max(...Object.values(por));
    const total = Object.values(por).reduce((s,v)=>s+v,0);
    Object.entries(por).sort((a,b)=>b[1]-a[1]).forEach(([nombre,tot]) => {
      const gr = state.grupos.find(g=>g.nombre===nombre);
      c.innerHTML += `<div class="resumen-item"><div class="resumen-row"><span class="resumen-nombre"><span class="grupo-dot" style="background:${gr?gr.color:'#888'}"></span>${gr?gr.emoji:''} ${nombre}</span><div class="resumen-valores"><span class="resumen-monto">${fmt(tot)}</span><span class="resumen-pct">${Math.round(tot/total*100)}%</span></div></div><div class="barra-bg"><div class="barra-fill" style="background:${gr?gr.color:'#888'};width:${Math.round(tot/max*100)}%"></div></div></div>`;
    });
  } else {
    gastosM.forEach(g => { por[g.cat]=(por[g.cat]||0)+g.monto; });
    const max = Math.max(...Object.values(por));
    const total = Object.values(por).reduce((s,v)=>s+v,0);
    Object.entries(por).sort((a,b)=>b[1]-a[1]).forEach(([nombre,tot]) => {
      const cat = state.categorias.find(c=>c.nombre===nombre);
      const color = colorGrupo(cat?.grupo);
      c.innerHTML += `<div class="resumen-item"><div class="resumen-row"><span class="resumen-nombre"><span class="grupo-dot" style="background:${color};width:6px;height:6px;flex-shrink:0;"></span>${cat?cat.emoji:''} ${nombre}</span><div class="resumen-valores"><span class="resumen-monto">${fmt(tot)}</span><span class="resumen-pct">${Math.round(tot/total*100)}%</span></div></div><div class="barra-bg"><div class="barra-fill" style="background:${color};width:${Math.round(tot/max*100)}%"></div></div></div>`;
    });
  }
}

// ---- CONFIG ----
function renderConfig() {
  const lista = document.getElementById('config-lista');
  lista.innerHTML = '';
  state.grupos.forEach(g => {
    const cats = state.categorias.filter(c=>c.grupo===g.nombre);
    if (!cats.length) return;
    const sec = document.createElement('div');
    sec.style.marginBottom = '12px';
    sec.innerHTML = `<div class="config-grupo-label"><span class="grupo-dot" style="background:${g.color}"></span>${g.emoji} ${g.nombre}</div>`;
    cats.forEach(cat => {
      const esFijo = cat.montoFijo !== null;
      const row = document.createElement('div');
      row.className = 'config-item';
      row.innerHTML = `<div class="config-item-left">${cat.emoji} ${cat.nombre}${esFijo?`<span class="config-fijo-badge">📌 ${fmt(cat.montoFijo)}</span>`:''}</div><div class="config-actions"><button class="btn-fijar" onclick="abrirModalConfig('${cat.nombre}')">${esFijo?'Editar':'Fijar $'}</button><button class="btn-delete" onclick="eliminarCat('${cat.nombre}')">✕</button></div>`;
      sec.appendChild(row);
    });
    lista.appendChild(sec);
  });
  const sel = document.getElementById('nueva-grupo');
  sel.innerHTML = state.grupos.map(g=>`<option value="${g.nombre}">${g.emoji} ${g.nombre}</option>`).join('');
}

function abrirModalConfig(catNombre) {
  catConfigActual = catNombre;
  const cat = state.categorias.find(c=>c.nombre===catNombre);
  document.getElementById('cfg-title').textContent = cat.emoji+' '+cat.nombre;
  document.getElementById('cfg-monto').value = cat.montoFijo !== null ? cat.montoFijo : '';
  document.getElementById('modal-config').classList.add('open');
  setTimeout(() => document.getElementById('cfg-monto').focus(), 150);
}

function guardarFijo() {
  const val = document.getElementById('cfg-monto').value;
  const cat = state.categorias.find(c=>c.nombre===catConfigActual);
  const m = parseFloat(val);
  cat.montoFijo = (val===''||isNaN(m)||m<=0) ? null : m;
  cerrarModal('modal-config');
  guardarState(); renderGrupos(); renderConfig();
  toast(cat.montoFijo!==null ? '📌 Fijo en '+fmt(cat.montoFijo) : cat.nombre+' vuelve a ser editable');
}

function agregarCategoria() {
  const nombre = document.getElementById('nueva-nombre').value.trim();
  const emoji = document.getElementById('nueva-emoji').value.trim() || '📌';
  const grupo = document.getElementById('nueva-grupo').value;
  if (!nombre) return;
  state.categorias.push({ nombre, grupo, emoji, historial:[], montoFijo:null });
  document.getElementById('nueva-nombre').value = '';
  document.getElementById('nueva-emoji').value = '';
  guardarState(); renderGrupos(); renderConfig();
  toast('✓ Categoría agregada');
}

function eliminarCat(nombre) {
  state.categorias = state.categorias.filter(c=>c.nombre!==nombre);
  guardarState(); renderGrupos(); renderConfig();
  toast('Categoría eliminada');
}

function agregarGrupo() {
  const emoji = document.getElementById('ng-emoji').value.trim() || '🏷️';
  const nombre = document.getElementById('ng-nombre').value.trim();
  const color = document.getElementById('ng-color').value;
  if (!nombre) return;
  state.grupos.push({ nombre, emoji, color });
  document.getElementById('ng-emoji').value = '';
  document.getElementById('ng-nombre').value = '';
  guardarState(); renderConfig();
  toast('✓ Grupo creado');
}

// ---- VOZ ----
function toggleMic() {
  setVozEstado('escuchando');
  document.getElementById('voz-live-txt').textContent = '';
  document.getElementById('modal-voz').classList.add('open');
  document.getElementById('btn-mic').classList.add('active');
  iniciarReconocimiento();
}

function cerrarModalVoz() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  document.getElementById('modal-voz').classList.remove('open');
  document.getElementById('btn-mic').classList.remove('active');
}

function detenerMic() { cerrarModalVoz(); }
function reiniciarVoz() { setVozEstado('escuchando'); document.getElementById('voz-live-txt').textContent=''; iniciarReconocimiento(); }

function setVozEstado(e) {
  ['escuchando','procesando','confirmar','error'].forEach(s =>
    document.getElementById('voz-'+s).style.display = s===e?'':'none'
  );
}

function iniciarReconocimiento() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setVozEstado('error');
    document.getElementById('voz-error-msg').textContent = 'Tu navegador no soporta voz. Usá Chrome en Android.';
    return;
  }
  recognition = new SR();
  recognition.lang = 'es-AR';
  recognition.interimResults = true;
  transcripcionFinal = '';
  recognition.onresult = e => {
    let interim = '';
    for (let i=e.resultIndex;i<e.results.length;i++) {
      if (e.results[i].isFinal) transcripcionFinal += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('voz-live-txt').textContent = transcripcionFinal||interim;
  };
  recognition.onend = () => {
    document.getElementById('btn-mic').classList.remove('active');
    if (transcripcionFinal.trim()) procesarConIA(transcripcionFinal.trim());
    else { setVozEstado('error'); document.getElementById('voz-error-msg').textContent='No escuché nada. Intentá de nuevo.'; }
  };
  recognition.onerror = e => {
    document.getElementById('btn-mic').classList.remove('active');
    setVozEstado('error');
    document.getElementById('voz-error-msg').textContent = e.error==='not-allowed'
      ? 'Necesito permiso para usar el micrófono.' : 'Error al escuchar. Intentá de nuevo.';
  };
  recognition.start();
}

async function procesarConIA(texto) {
  setVozEstado('procesando');
  document.getElementById('voz-transcripto').textContent = '"'+texto+'"';
  const cats = state.categorias.map(c=>c.nombre).join(', ');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: `Interpretás comandos de voz para registrar gastos en pesos argentinos. Categorías: ${cats}. Respondé SOLO con JSON sin texto extra ni backticks. Formato: {"categoria":"nombre exacto","monto":número}. Si no podés: {"error":"motivo"}. Conversiones: "45 mil"=45000, "45k"=45000, "45 lucas"=45000.`,
        messages: [{ role:'user', content: texto }]
      })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text||'').trim();
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) { const m=raw.match(/\{[\s\S]*\}/); parsed = m?JSON.parse(m[0]):null; }
    if (!parsed) throw new Error('parse');
    if (parsed.error) { setVozEstado('error'); document.getElementById('voz-error-msg').textContent=parsed.error; return; }
    const cat = state.categorias.find(c=>c.nombre===parsed.categoria);
    if (!cat||!parsed.monto||parsed.monto<=0) { setVozEstado('error'); document.getElementById('voz-error-msg').textContent='No pude identificar la categoría o el monto.'; return; }
    vozResultado = { cat, monto: parsed.monto };
    document.getElementById('vc-emoji').textContent = cat.emoji;
    document.getElementById('vc-nombre').textContent = cat.nombre;
    document.getElementById('vc-grupo').textContent = cat.grupo;
    document.getElementById('vc-monto').value = parsed.monto;
    setVozEstado('confirmar');
  } catch(e) {
    setVozEstado('error');
    document.getElementById('voz-error-msg').textContent = 'Hubo un problema. Intentá de nuevo.';
  }
}

function confirmarVoz() {
  if (!vozResultado) return;
  const monto = parseFloat(document.getElementById('vc-monto').value);
  if (!monto||monto<=0) return;
  const cat = vozResultado.cat;
  cat.historial.push(monto);
  const g = { cat:cat.nombre, grupo:cat.grupo, emoji:cat.emoji, monto, ts:new Date().toISOString(), fuenteVoz:true };
  state.gastos.unshift(g);
  cerrarModalVoz();
  guardarState(); actualizarTotales(); renderGrupos(); actualizarHistorial();
  syncSheets(g);
  toast('🎙️ '+cat.nombre+' — '+fmt(monto));
  vozResultado = null;
}

// ---- TOAST ----
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.style.display='none', 2400);
}

// ---- INIT ----
renderGrupos();
actualizarTotales();
actualizarHistorial();

// Cerrar modales con tap en overlay
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target===el) { cerrarModal(el.id); if(el.id==='modal-voz') cerrarModalVoz(); } });
});
</script>
